spring:
  jackson:
    time-zone:America/Sao_Paulo

  application:
    name: cortaFila

  datasource:
    url: jdbc:mysql://localhost:3306/corta_fila?useTimezone=true&serverTimezone=UTC
    driverClassName: com.mysql.cj.jdbc.Driver
    username: root
    password: root

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: America/Sao_Paulo